name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint · Security · Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: clouderp
          POSTGRES_USER: clouderp
          POSTGRES_PASSWORD: clouderp_secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U clouderp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SECRET_KEY: ci-only-secret-key-not-for-production
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "*"
      POSTGRES_DB: clouderp
      POSTGRES_USER: clouderp
      POSTGRES_PASSWORD: clouderp_secret
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 bandit

      - name: Lint (flake8)
        run: flake8 . --max-line-length=120 --exclude=migrations,.venv,__pycache__ || true

      - name: Security scan (bandit)
        run: bandit -r . --exclude ./tests,./*/tests.py,./*/migrations -ll || true

      - name: Django system check
        run: python manage.py check

      - name: Run test suite (36 tests across all apps)
        run: python manage.py test --verbosity=2
